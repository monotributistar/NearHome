services:
  mariadb:
    image: mariadb:10.11
    container_name: nearhome-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - nearhome-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nearhome-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nearhome-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nearhome-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mariadb:3306/nearhome
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "8000:8000"
    networks:
      - nearhome-net

  detector:
    build:
      context: ./detection
      dockerfile: Dockerfile
    container_name: nearhome-detector
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_BASE_URL: http://api:8000
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "8001:8001"
    volumes:
      - yolo_models:/root/.cache/ultralytics
    networks:
      - nearhome-net

  shinobi:
    image: registry.gitlab.com/shinobi-systems/shinobi:dev
    container_name: nearhome-shinobi-nvr
    restart: unless-stopped
    depends_on:
      detector:
        condition: service_started
    environment:
      HOME_URL: ${HOME_URL:-http://localhost:8080}
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
      PLUGIN_KEYS: '{"yolo":{"host":"detector","port":"8001"}}'
    ports:
      - "8080:8080"
    volumes:
      - shinobi_config:/config
      - shinobi_data:/var/lib/mysql
      - shinobi_videos:/opt/shinobi/videos
      - shinobi_plugins:/home/Shinobi/plugins
      - /etc/localtime:/etc/localtime:ro
    networks:
      - nearhome-net

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  shinobi_config:
    driver: local
  shinobi_data:
    driver: local
  shinobi_videos:
    driver: local
  shinobi_plugins:
    driver: local
  yolo_models:
    driver: local

networks:
  nearhome-net:
    driver: bridge
