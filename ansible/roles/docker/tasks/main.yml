---
- name: Install docker engine and compose plugin
  ansible.builtin.apt:
    update_cache: true
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Ensure deploy user is in docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
