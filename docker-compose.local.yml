services:
  mariadb:
    image: mariadb:10.11
    container_name: nearhome-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nearhome-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: nearhome-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mariadb:3306/nearhome
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "8000:8000"

  detector:
    build:
      context: ./detection
      dockerfile: Dockerfile
    container_name: nearhome-detector
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_BASE_URL: http://host.docker.internal:8000
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    volumes:
      - yolo_models:/root/.cache/ultralytics
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  shinobi:
    image: shinobisystems/shinobi:latest
    container_name: nearhome-shinobi
    restart: unless-stopped
    volumes:
      - shinobi_config:/config
      - shinobi_data:/var/lib/mysql
      - shinobi_videos:/opt/shinobi/videos
    environment:
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
  redis_data:
  shinobi_config:
  shinobi_data:
  shinobi_videos:
  shinobi_plugins:
  yolo_models:
