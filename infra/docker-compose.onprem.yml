name: nearhome-stack-onprem

services:
  api:
    environment:
      CORS_ORIGIN_ADMIN: ${ONPREM_ADMIN_ORIGIN}
      CORS_ORIGIN_PORTAL: ${ONPREM_PORTAL_ORIGIN}
      STREAM_GATEWAY_URL: http://stream-gateway:3010
      EVENT_GATEWAY_URL: http://event-gateway:3011
  stream-gateway:
    environment:
      STREAM_MEDIA_ENGINE: ${STREAM_MEDIA_ENGINE:-process}
      STREAM_TRANSCODER_PRESET: ${STREAM_TRANSCODER_PRESET:-ffmpeg-hls-retention}
      STREAM_TRANSCODER_DRY_RUN: ${STREAM_TRANSCODER_DRY_RUN:-0}
      STREAM_STORAGE_DEFAULT_VAULT_ID: ${STREAM_STORAGE_DEFAULT_VAULT_ID:-vault-main}
      STREAM_STORAGE_VAULTS_JSON: ${STREAM_STORAGE_VAULTS_JSON:-[{"id":"vault-main","basePath":"/data/storage"}]}
      STREAM_STORAGE_PLAN_VAULT_MAP_JSON: ${STREAM_STORAGE_PLAN_VAULT_MAP_JSON:-{}}
      STREAM_MEDIAMTX_BIN: ${STREAM_MEDIAMTX_BIN:-mediamtx}
      STREAM_DEFAULT_INGEST_TRANSPORT: ${STREAM_DEFAULT_INGEST_TRANSPORT:-tcp}
      STREAM_DEFAULT_INGEST_ENCRYPTION: ${STREAM_DEFAULT_INGEST_ENCRYPTION:-required}
      STREAM_DEFAULT_INGEST_TUNNEL: ${STREAM_DEFAULT_INGEST_TUNNEL:-https}
      STREAM_RETENTION_ENABLED: ${STREAM_RETENTION_ENABLED:-1}
      STREAM_RETENTION_DAYS: ${STREAM_RETENTION_DAYS:-7}
      STREAM_RETENTION_SWEEP_MS: ${STREAM_RETENTION_SWEEP_MS:-300000}
      STREAM_RETENTION_MIN_FILE_AGE_SECONDS: ${STREAM_RETENTION_MIN_FILE_AGE_SECONDS:-45}
      STREAM_RETENTION_MAX_DISK_USAGE_PCT: ${STREAM_RETENTION_MAX_DISK_USAGE_PCT:-85}
      STREAM_RETENTION_TARGET_DISK_USAGE_PCT: ${STREAM_RETENTION_TARGET_DISK_USAGE_PCT:-75}
      STREAM_RETENTION_FILE_EXTENSIONS: ${STREAM_RETENTION_FILE_EXTENSIONS:-.ts,.m4s,.mp4,.mkv,.fmp4}
      STREAM_RETENTION_SEGMENT_SECONDS: ${STREAM_RETENTION_SEGMENT_SECONDS:-4}
      STREAM_RETENTION_LIVE_LIST_SIZE: ${STREAM_RETENTION_LIVE_LIST_SIZE:-15}
      STREAM_FFMPEG_VIDEO_MODE: ${STREAM_FFMPEG_VIDEO_MODE:-copy}
      STREAM_FFMPEG_TARGET_BITRATE_KBPS: ${STREAM_FFMPEG_TARGET_BITRATE_KBPS:-2500}
      STREAM_FFMPEG_MAXRATE_KBPS: ${STREAM_FFMPEG_MAXRATE_KBPS:-3000}
      STREAM_FFMPEG_BUFSIZE_KBPS: ${STREAM_FFMPEG_BUFSIZE_KBPS:-5000}
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN}"]
    restart: unless-stopped
    depends_on:
      - api
      - event-gateway
    networks:
      - nearhome_net
