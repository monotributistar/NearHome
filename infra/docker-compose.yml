name: nearhome-stack

services:
  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.node-workspace
    command: ["pnpm", "--filter", "@app/api", "dev"]
    environment:
      PORT: 3001
      JWT_SECRET: dev-super-secret
      STREAM_TOKEN_SECRET: dev-stream-token-secret
      DATABASE_URL: file:./dev.db
      STREAM_GATEWAY_URL: http://stream-gateway:3010
      DETECTION_EXECUTION_MODE: temporal
      DETECTION_TEMPORAL_DISPATCH_URL: http://detection-dispatcher:8072
      DETECTION_CALLBACK_SECRET: dev-detection-callback-secret
      EVENT_GATEWAY_URL: http://event-gateway:3011
      EVENT_PUBLISH_SECRET: dev-event-publish-secret
      SUPERUSER_EMAILS: ${SUPERUSER_EMAILS:-admin@nearhome.dev}
      CORS_ORIGIN_ADMIN: http://localhost:5173
      CORS_ORIGIN_PORTAL: http://localhost:5174
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: nearhome-detection
    ports:
      - "3001:3001"
    depends_on:
      - stream-gateway
      - temporal
      - detection-dispatcher
    networks:
      - nearhome_net

  stream-gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.node-workspace
    command: ["pnpm", "--filter", "@app/stream-gateway", "dev"]
    environment:
      PORT: 3010
      STREAM_STORAGE_DIR: /data/storage
      STREAM_TOKEN_SECRET: dev-stream-token-secret
      STREAM_PROBE_INTERVAL_MS: 5000
    ports:
      - "3010:3010"
    volumes:
      - stream_storage:/data/storage
    networks:
      - nearhome_net

  event-gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.node-workspace
    command: ["pnpm", "--filter", "@app/event-gateway", "dev"]
    environment:
      PORT: 3011
      JWT_SECRET: dev-super-secret
      EVENT_PUBLISH_SECRET: dev-event-publish-secret
    ports:
      - "3011:3011"
    depends_on:
      - redis
    networks:
      - nearhome_net

  inference-bridge:
    build:
      context: ../apps/inference-bridge
      dockerfile: Dockerfile
    environment:
      INFERENCE_TIMEOUT_MS: 15000
      NODE_AUTH_JWT_SECRET: ${NODE_AUTH_JWT_SECRET:-dev-node-auth-secret}
      NODE_AUTH_ADMIN_SECRET: ${NODE_AUTH_ADMIN_SECRET:-dev-node-auth-admin-secret}
      NODE_HEARTBEAT_TTL_MS: ${NODE_HEARTBEAT_TTL_MS:-60000}
    ports:
      - "8090:8090"
    networks:
      - nearhome_net

  detection-worker:
    build:
      context: ../apps/detection-worker
      dockerfile: Dockerfile
    environment:
      TEMPORAL_SERVER: temporal:7233
      TEMPORAL_TASK_QUEUE: nearhome-detection
      INFERENCE_BRIDGE_URL: http://inference-bridge:8090
      CONTROL_PLANE_URL: http://api:3001
      DETECTION_CALLBACK_SECRET: dev-detection-callback-secret
    depends_on:
      - temporal
      - inference-bridge
    networks:
      - nearhome_net

  detection-dispatcher:
    build:
      context: ../apps/detection-worker
      dockerfile: Dockerfile
    command: ["uvicorn", "dispatcher:app", "--host", "0.0.0.0", "--port", "8072"]
    environment:
      TEMPORAL_SERVER: temporal:7233
      TEMPORAL_TASK_QUEUE: nearhome-detection
    ports:
      - "8072:8072"
    depends_on:
      - temporal
    networks:
      - nearhome_net

  inference-node-yolo:
    build:
      context: ../apps/inference-node-yolo
      dockerfile: Dockerfile
    environment:
      INFERENCE_BRIDGE_URL: http://inference-bridge:8090
      NODE_ID: ${YOLO_NODE_ID:-node-yolo-1}
      NODE_RUNTIME: yolo
      NODE_TENANT_ID: ${YOLO_NODE_TENANT_ID:-}
      NODE_ENDPOINT: ${YOLO_NODE_ENDPOINT:-http://inference-node-yolo:8091}
      NODE_TASK_TYPES: ${YOLO_NODE_TASK_TYPES:-object_detection}
      NODE_MODELS: ${YOLO_NODE_MODELS:-yolo26n@1.0.0,yolo26s@1.0.0}
      NODE_MAX_CONCURRENT: ${YOLO_NODE_MAX_CONCURRENT:-4}
      NODE_RESOURCES_CPU: ${YOLO_NODE_RESOURCES_CPU:-8}
      NODE_RESOURCES_GPU: ${YOLO_NODE_RESOURCES_GPU:-0}
      NODE_RESOURCES_VRAM_MB: ${YOLO_NODE_RESOURCES_VRAM_MB:-0}
      NODE_HEARTBEAT_INTERVAL_MS: ${YOLO_NODE_HEARTBEAT_INTERVAL_MS:-10000}
      NODE_AUTH_ADMIN_SECRET: ${NODE_AUTH_ADMIN_SECRET:-dev-node-auth-admin-secret}
    ports:
      - "8091:8091"
    depends_on:
      - inference-bridge
    networks:
      - nearhome_net

  inference-node-mediapipe:
    build:
      context: ../apps/inference-node-mediapipe
      dockerfile: Dockerfile
    environment:
      INFERENCE_BRIDGE_URL: http://inference-bridge:8090
      NODE_ID: ${MEDIAPIPE_NODE_ID:-node-mediapipe-1}
      NODE_RUNTIME: mediapipe
      NODE_TENANT_ID: ${MEDIAPIPE_NODE_TENANT_ID:-}
      NODE_ENDPOINT: ${MEDIAPIPE_NODE_ENDPOINT:-http://inference-node-mediapipe:8092}
      NODE_TASK_TYPES: ${MEDIAPIPE_NODE_TASK_TYPES:-pose_estimation,action_recognition}
      NODE_MODELS: ${MEDIAPIPE_NODE_MODELS:-mediapipe_pose@0.10.0}
      NODE_MAX_CONCURRENT: ${MEDIAPIPE_NODE_MAX_CONCURRENT:-2}
      NODE_RESOURCES_CPU: ${MEDIAPIPE_NODE_RESOURCES_CPU:-4}
      NODE_RESOURCES_GPU: ${MEDIAPIPE_NODE_RESOURCES_GPU:-0}
      NODE_RESOURCES_VRAM_MB: ${MEDIAPIPE_NODE_RESOURCES_VRAM_MB:-0}
      NODE_HEARTBEAT_INTERVAL_MS: ${MEDIAPIPE_NODE_HEARTBEAT_INTERVAL_MS:-10000}
      NODE_AUTH_ADMIN_SECRET: ${NODE_AUTH_ADMIN_SECRET:-dev-node-auth-admin-secret}
    ports:
      - "8092:8092"
    depends_on:
      - inference-bridge
    networks:
      - nearhome_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nearhome_net

  temporal-postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg:/var/lib/postgresql/data
    networks:
      - nearhome_net

  temporal:
    image: temporalio/auto-setup:1.26.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    depends_on:
      - temporal-postgres
    ports:
      - "7233:7233"
    networks:
      - nearhome_net

  temporal-ui:
    image: temporalio/ui:2.31.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8088
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - nearhome_net

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - nearhome_net

  alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: ["observability"]
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        awk '{
          gsub("__DEFAULT_WEBHOOK_URL__", ENVIRON["ALERTMANAGER_WEBHOOK_DEFAULT_URL"]);
          gsub("__CRITICAL_WEBHOOK_URL__", ENVIRON["ALERTMANAGER_WEBHOOK_CRITICAL_URL"]);
          gsub("__WARNING_WEBHOOK_URL__", ENVIRON["ALERTMANAGER_WEBHOOK_WARNING_URL"]);
          gsub("__INFO_WEBHOOK_URL__", ENVIRON["ALERTMANAGER_WEBHOOK_INFO_URL"]);
          print
        }' /etc/alertmanager/alertmanager.yml > /tmp/alertmanager-runtime.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager-runtime.yml
    environment:
      ALERTMANAGER_WEBHOOK_DEFAULT_URL: ${ALERTMANAGER_WEBHOOK_DEFAULT_URL:-http://alert-webhook:80/default}
      ALERTMANAGER_WEBHOOK_CRITICAL_URL: ${ALERTMANAGER_WEBHOOK_CRITICAL_URL:-http://alert-webhook:80/critical}
      ALERTMANAGER_WEBHOOK_WARNING_URL: ${ALERTMANAGER_WEBHOOK_WARNING_URL:-http://alert-webhook:80/warning}
      ALERTMANAGER_WEBHOOK_INFO_URL: ${ALERTMANAGER_WEBHOOK_INFO_URL:-http://alert-webhook:80/info}
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - alert-webhook
    networks:
      - nearhome_net

  alert-webhook:
    image: ealen/echo-server:latest
    profiles: ["observability"]
    ports:
      - "18080:80"
    networks:
      - nearhome_net

  grafana:
    image: grafana/grafana:11.1.5
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3005:3000"
    depends_on:
      - prometheus
    networks:
      - nearhome_net

networks:
  nearhome_net:
    driver: bridge

volumes:
  stream_storage:
  temporal_pg:
