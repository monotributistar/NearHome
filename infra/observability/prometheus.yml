global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api"
    metrics_path: /health
    static_configs:
      - targets: ["api:3001"]

  - job_name: "stream-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["stream-gateway:3010"]

  - job_name: "event-gateway"
    metrics_path: /health
    static_configs:
      - targets: ["event-gateway:3011"]
