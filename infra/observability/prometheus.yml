global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3001"]

  - job_name: "stream-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["stream-gateway:3010"]

  - job_name: "inference-bridge"
    metrics_path: /metrics
    static_configs:
      - targets: ["inference-bridge:8090"]
